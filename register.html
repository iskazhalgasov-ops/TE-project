<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация | LavandaBloom</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(to right, #f3e5f5, #ede7f6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.auth-container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(142, 36, 170, 0.2);
    width: 350px;
    text-align: center;
}

.logo {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #8e24aa;
    margin-bottom: 10px;
}

h2 {
    font-family: 'Playfair Display', serif;
    margin-bottom: 25px;
    color: #4a148c;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #d1c4e9;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #8e24aa;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: #8e24aa;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #6a1b9a;
}

.auth-link {
    margin-top: 15px;
    font-size: 14px;
}

.auth-link a {
    color: #8e24aa;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>
<body>

<div class="auth-container">
    <div class="logo">LavandaBloom</div>
    <h2>Регистрация</h2>

    <form id="registerForm">
        <input type="text" id="name" placeholder="Имя" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Зарегистрироваться</button>
    </form>

    <div class="auth-link">
        Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();

    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const res = await fetch('http://localhost:3000/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name: nameInput.value.trim(),
            email: emailInput.value.trim(),
            password: passwordInput.value.trim()
        })
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
    } else {
        alert("Регистрация успешна!");
        window.location.href = "login.html";
    }
});


</script>

</body>
</html>
